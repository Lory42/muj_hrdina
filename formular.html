</head>
<body>

    <ul>

<main>
<section>
    <form id="loginForm" class="form-site" action="" method="post" style="display: none;">
        
  <h2 class="form-header">PŘIHLÁŠENÍ</h2> 

  <div class="position-in">
    <label for="email">E-mail<br /></label>
      <input type="email" id="email" name="email" required placeholder="uzivatelskejmeno@domena.cz"/>
    
    <label for="heslo">Heslo<br /></label>
<div class="password-container">
    <input type="password" id="heslo" name="heslo" required />
    <span id="icon-heslo" class="eye-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
            <circle cx="12" cy="12" r="3"/>
        </svg>
    </span>
</div>

    <div class="checkbox-group">
      <input type="checkbox" id="zapamatovat-si" name="zapamatovat-si"/>
      <label for="zapamatovat-si">Zapamatovat si</label>

    <a href="zapomenute-heslo.html" class="forgot-password">Zapomenuté heslo</a>
    </div>

    <div class="button-flex">
    <button type="submit" class="submit-button">PŘIHLÁSIT SE</button>
    <button type="reset" class="reset-button">SMAZAT VŠE</button>
    </div>

    <a href="registrace.html" class="registration">Nemáte účet? Zaregistrujte se zde.</a>
  </div>
</form>

    <div id="success-message" style="display: none;">
        <h1 class="blue-color">Úspěšně přihlášen!</h1>
        <p id="success-info"></p>
        <button id="switch-account" type="button" class="prepnout-ucet">Odhlásit se</button>
        </div>
</section>
</main>
<footer>
    <p>© Vytvořil Marek Lorenc, třída IT1B, v roce 2025, pro <a href="https://www.spskh.cz/">VOŠ, SPŠ a JŠ KUTNÁ HORA</a></p>
</footer>


<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, browserLocalPersistence, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCe1ryc5qIKE2GRzSv3xV-P6yIXCK_bNsg",
    authDomain: "spider-man-web.firebaseapp.com",
    projectId: "spider-man-web",
    storageBucket: "spider-man-web.firebasestorage.app",
    messagingSenderId: "167500312977",
    appId: "1:167500312977:web:a634a1f5e2736381576a30",
    measurementId: "G-BBDC6STHYH"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const okoOtevrene = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`;
  const okoPreskrtnute = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>`;

  function toggleHeslo(id) {
    const input = document.getElementById(id);
    const ikonaKontejner = document.getElementById('icon-' + id);

    if (input.type === "password") {
      input.type = "text";
      ikonaKontejner.innerHTML = okoPreskrtnute;
    } else {
      input.type = "password";
      ikonaKontejner.innerHTML = okoOtevrene;
    }
  }

  const iconHeslo = document.getElementById('icon-heslo');
  iconHeslo.addEventListener('click', () => toggleHeslo('heslo'));

  const loginForm = document.getElementById('loginForm');
  const rememberMe = document.getElementById('zapamatovat-si');
  const emailInput = document.getElementById('email');
  const hesloInput = document.getElementById('heslo');
  const successMessage = document.getElementById('success-message');
  const successInfo = document.getElementById('success-info');
  const switchAccount = document.getElementById('switch-account');

  // Načtení uložených údajů při načtení stránky
  const savedEmail = localStorage.getItem('savedEmail');
  const savedHeslo = localStorage.getItem('savedHeslo');
  
  if (savedEmail) {
    emailInput.value = savedEmail;
    rememberMe.checked = true;
  }
  
  if (savedHeslo) {
    hesloInput.value = savedHeslo;
  }

  function showSignedIn(user) {
    if (!user) return;
    loginForm.style.display = 'none';
    const displayName = user.displayName || user.email;
    successInfo.textContent = `Přihlášen jako ${displayName}`;
    successMessage.style.display = 'block';
  }

  function showLogin() {
    successMessage.style.display = 'none';
    loginForm.style.display = 'block';
  }

  onAuthStateChanged(auth, (user) => {
    if (user) {
      showSignedIn(user);
    } else {
      showLogin();
    }
  });

  switchAccount.addEventListener('click', async () => {
    await signOut(auth);
    showLogin();
  });

  loginForm.addEventListener('submit', async (event) => {
    event.preventDefault();

    const email = emailInput.value;
    const heslo = hesloInput.value;

    try {
      await setPersistence(auth, browserLocalPersistence);
      await signInWithEmailAndPassword(auth, email, heslo);
      
      // Uložení údajů, pokud je checkbox zaškrtnuto
      if (rememberMe.checked) {
        localStorage.setItem('savedEmail', email);
        localStorage.setItem('savedHeslo', heslo);
      } else {
        localStorage.removeItem('savedEmail');
        localStorage.removeItem('savedHeslo');
      }
      
      // onAuthStateChanged already updates the UI when signed in
    } catch (error) {
      console.error(error);
      if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
        alert('Neplatné přihlašovací údaje. Zkontroluj e-mail a heslo.');
      } else {
        alert('Chyba přihlášení: ' + error.message);
      }
    }
  });
</script>

</body>
</html>
