    <script>
// 1. Výběr prvků (tvůj kód + náš nový overlay)
const hamburger = document.querySelector('.hamburger');
const navMenu = document.querySelector('nav ul');
const overlay = document.getElementById('menu-overlay'); // Přidáno: výběr ztmavovací vrstvy

// 2. Kliknutí na hamburger (tvůj kód doplněný o overlay)
hamburger.addEventListener('click', () => {
    navMenu.classList.toggle('open'); // Tvoje původní otevírání menu
    overlay.classList.toggle('active'); // Přidáno: zapnutí/vypnutí ztmavení
    window.scrollTo({ top: 0, behavior: 'smooth' }); // Tvůj původní scroll nahoru
});

// 3. BONUS: Zavření menu při kliknutí mimo něj (na ztmavené pozadí)
overlay.addEventListener('click', () => {
    navMenu.classList.remove('open'); // Zavře menu
    overlay.classList.remove('active'); // Vypne ztmavení
});
</script>
