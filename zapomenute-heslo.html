<main>
<section>
    <form class="form-site" id="zapomenuteFormular" action="" method="post">
        
  <h2 class="form-header">ZAPOMENUTÉ HESLO</h2> 

  <div class="position-in">
    <label for="email">E-mail pro obnovení hesla<br /></label>
      <input type="email" id="email" name="email" required placeholder="uzivatelskejmeno@domena.cz"/>

      <div class="button-flex">
    <button type="submit" class="submit-button-forgot-psw">POSALT ODKAZ PRO OBNOVENÍ</button>
    </div>
    <div id="formMessage" class="form-message" aria-live="polite"></div>
</div>
    </form>

<script type="module">
  // Importujeme potřebné funkce z Firebase SDK
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";
  import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";

  // 1. Tvoje konfigurace z Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCe1ryc5qIKE2GRzSv3xV-P6yIXCK_bNsg", 
    authDomain: "spider-man-web.firebaseapp.com",
    projectId: "spider-man-web",
    storageBucket: "spider-man-web.firebasestorage.app",
    messagingSenderId: "167500312977",
    appId: "1:167500312977:web:a634a1f5e2736381576a30",
    measurementId: "G-BBDC6STHYH"
  };

  // Inicializace Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Konfigurace přesměrování – pošle uživatele z e-mailu zpět na tvůj lokální web
  const actionCodeSettings = {
    url: 'http://127.0.0.1:5500/obnoveni-hesla.html', // Ujisti se, že název souboru přesně sedí
    handleCodeInApp: true,
  };

  // 2. Logika odeslání formuláře
  const formular = document.getElementById('zapomenuteFormular');
  const spravaDiv = document.getElementById('formMessage');

  formular.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim().toLowerCase();
    if (!email) return;

    try {
      // Voláme funkci s actionCodeSettings -> Firebase pošle mail s odkazem na náš web
      await sendPasswordResetEmail(auth, email, actionCodeSettings);

      // Úspěch
      spravaDiv.style.color = "#104b99";
      spravaDiv.innerText = "E-mail pro obnovení hesla byl odeslán. Zkontrolujte si svůj e-mail.";
      formular.reset(); // Vyčistí políčko formuláře

    } catch (error) {
      // Logování chyb do konzole (F12) pro kontrolu
      console.error("Chyba při obnově hesla:", error);
      spravaDiv.style.color = "red";

      // Kontrola, zda e-mail neexistuje (Firebase může vrátit auth/user-not-found nebo auth/invalid-credential)
      if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
        spravaDiv.innerText = "Tento e-mail u nás není registrován.";
      } else if (error.code === 'auth/invalid-email') {
        spravaDiv.innerText = "Zadaná e-mailová adresa nemá správný formát.";
      } else {
        spravaDiv.innerText = "Něco se nepovedlo. Zkuste to prosím znovu.";
      }
    }
  });
</script>
</body>
