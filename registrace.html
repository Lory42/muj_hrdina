<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Na této stránce se dozvíte základní informace ze superhrdinského světa - The Amazing Spider-Man. Z této stránky si také můžete prohlednout další stránky, jako jsou např. příběh, schopnosti a další">
    <meta name="author" content="Marek Lorenc">
    <meta name="keywords" content="Spider-Man, úvod, kdo je to Spider-Man?, základní infomace o Spider-Manovi, představení Spider-Mana">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="icon" href="img/cerne-logo-spidermana.png" type="image/png">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Fjalla+One&display=swap" rel="stylesheet">
    <title>Registrace - Spider-Man</title>

</head>
<body>

<main>
  <form class="form-site" id="registracniFormular">
    <h2 class="form-header">REGISTRACE</h2>

    <div class="position-in">
      <label for="jmeno">Celé jméno<br /></label>
      <input type="text" id="jmeno" name="jmeno" required placeholder="Jan Novák"/>

      <label for="email">E-mail<br /></label>
      <input type="email" id="email" name="email" required placeholder="uzivatelskejmeno@domena.cz"/>

      <label for="heslo">Heslo<br /></label>
<div class="password-container">
    <input type="password" id="heslo" name="heslo" required />
    
    <span onclick="toggleHeslo('heslo')" id="icon-heslo" class="eye-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
            <circle cx="12" cy="12" r="3"/>
        </svg>
    </span>
</div>

      <label for="heslo_potvrzeni">Potvrzení hesla<br /></label>
      <div class="password-container">
        <input type="password" id="heslo_potvrzeni" name="heslo_potvrzeni" required/>
        <span onclick="toggleHeslo('heslo_potvrzeni')" id="icon-heslo_potvrzeni" class="eye-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        </span>
      </div>

      <div class="button-flex">
        <button type="submit" class="submit-button">ZAREGISTROVAT SE</button>
        <button type="reset" class="reset-button">SMAZAT VŠE</button>
      </div>

      <a href="formular.html" class="registration">Vrátit se zpět na přihlášení</a>
    </div>
  </form> 
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
  import { getAuth, createUserWithEmailAndPassword, sendEmailVerification, updateProfile } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

  // 1. Tvoje konfigurace z Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCe1ryc5qIKE2GRzSv3xV-P6yIXCK_bNsg",
    authDomain: "spider-man-web.firebaseapp.com",
    projectId: "spider-man-web",
    storageBucket: "spider-man-web.firebasestorage.app",
    messagingSenderId: "167500312977",
    appId: "1:167500312977:web:a634a1f5e2736381576a30",
    measurementId: "G-BBDC6STHYH"
  };

  // Inicializace Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const auth = getAuth(app);

  // 2. LOGIKA PRO OKO (Zobrazování / Skrývání hesla)
  // Nadefinování SVG vzhledu ikon (čisté linky) podle tvého skriptu
  const okoOtevrene = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
  const okoPreskrtnute = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

  // Funkce, která přepne typ inputu a ikonku
  function toggleHeslo(id) {
    const input = document.getElementById(id);
    const ikonaKontejner = document.getElementById('icon-' + id);

    if (input.type === "password") {
      input.type = "text";
      ikonaKontejner.innerHTML = okoPreskrtnute; // Přepne na přeškrtnuté oko
    } else {
      input.type = "password";
      ikonaKontejner.innerHTML = okoOtevrene;    // Vrátí obyčejné oko
    }
  }

  // Výchozí nastavení očí po načtení stránky (vloží otevřené oko do obou polí)
  const eye1 = document.getElementById('icon-heslo');
  const eye2 = document.getElementById('icon-heslo_potvrzeni');
  eye1.innerHTML = okoOtevrene;
  eye2.innerHTML = okoOtevrene;

  // Aktivace klikání na ikonky
  eye1.addEventListener('click', () => toggleHeslo('heslo'));
  eye2.addEventListener('click', () => toggleHeslo('heslo_potvrzeni'));


  // 3. LOGIKA ODESLÁNÍ FORMULÁŘE (Firebase)
  document.getElementById('registracniFormular').addEventListener('submit', async (e) => {
    e.preventDefault();

    const jmeno = document.getElementById('jmeno').value;
    const email = document.getElementById('email').value;
    const heslo = document.getElementById('heslo').value;
    const hesloPotvrzeni = document.getElementById('heslo_potvrzeni').value;

    if (heslo !== hesloPotvrzeni) {
      alert("Chyba: Hesla se neshodují!");
      return;
    }

    try {
      // Vytvoření účtu ve Firebase
      const userCredential = await createUserWithEmailAndPassword(auth, email, heslo);
      const user = userCredential.user;

      // Uložení jména do profilu
      await updateProfile(user, { displayName: jmeno });

      // Odeslání e-mailu na ověření účtu
      await sendEmailVerification(user);

      alert("Registrace úspěšná! Na e-mail " + email + " ti přišel potvrzovací odkaz. Dokud na něj neklikneš, nepustí tě to k hodnocení Spider-mana.");
      
      window.location.href = "formular.html";

    } catch (error) {
      console.error("Chyba:", error);
      if (error.code === 'auth/email-already-in-use') {
        alert("Tento e-mail už u nás má účet.");
      } else if (error.code === 'auth/weak-password') {
        alert("Heslo je příliš slabé. Zvol aspoň 6 znaků.");
      } else {
        alert("Něco se nepovedlo: " + error.message);
      }
    }
  });
</script>
</body>
</html>
